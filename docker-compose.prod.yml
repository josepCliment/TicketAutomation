services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - sqlite_data:/var/www/html/database
      - storage_data:/var/www/html/storage
    ports:
      - "80:80"

volumes:
  sqlite_data:
  storage_data:
